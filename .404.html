<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Not found</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fff; color: #1f2328;
    max-width: 700px; margin: 60px auto; padding: 0 20px;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .path { color: #57606a; font-size: 15px; margin-bottom: 24px; word-break: break-all; }
  .searching { color: #57606a; font-size: 14px; }
  .results { margin-top: 16px; }
  .results a {
    display: block; padding: 8px 12px; margin: 4px 0;
    background: #f6f8fa; border-radius: 6px;
    color: #0969da; text-decoration: none; font-size: 14px;
  }
  .results a:hover { background: #ddf4ff; }
  .results .match-path { color: #57606a; font-size: 12px; margin-top: 2px; }
  .no-results { color: #57606a; font-size: 14px; margin-top: 16px; }
  .home-link { margin-top: 24px; font-size: 14px; }
  .home-link a { color: #0969da; text-decoration: none; }
  .home-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Not found</h1>
<p class="path" id="path"></p>
<div id="output"></div>
<div class="home-link"><a href="/">Browse project root</a></div>

<script>
(async () => {
  const path = location.pathname;
  document.getElementById('path').textContent = path;

  // Extract last meaningful segment (strip trailing slash, extension)
  const segments = path.replace(/\/+$/, '').split('/').filter(Boolean);
  const lastSeg = segments[segments.length - 1] || '';
  // Also try without extension
  const needle = lastSeg.replace(/\.\w+$/, '').toLowerCase();

  if (!needle) return;

  const output = document.getElementById('output');
  output.innerHTML = '<p class="searching">Searching for "<strong>' + needle + '</strong>"…</p>';

  // Recursively search directories via browse JSON API
  const matches = [];
  const searched = new Set();
  const MAX_MATCHES = 10;
  const MAX_DIRS = 50;
  let dirsSearched = 0;

  async function searchDir(dirPath) {
    if (dirsSearched >= MAX_DIRS || matches.length >= MAX_MATCHES) return;
    if (searched.has(dirPath)) return;
    searched.add(dirPath);
    dirsSearched++;

    try {
      const res = await fetch(dirPath, { headers: { 'Accept': 'application/json' } });
      if (!res.ok) return;
      const entries = await res.json();
      if (!Array.isArray(entries)) return;

      const subdirs = [];
      for (const entry of entries) {
        if (entry.name.startsWith('.')) continue;
        const entryName = entry.name.replace(/\.\w+$/, '').toLowerCase();
        const entryUrl = entry.url.replace(/^\.\//, '');
        const fullPath = dirPath + entryUrl;
        if (entryName.includes(needle) || needle.includes(entryName)) {
          matches.push({ name: entry.name, path: fullPath, isDir: entry.is_dir });
        }
        if (entry.is_dir) {
          subdirs.push(fullPath.endsWith('/') ? fullPath : fullPath + '/');
        }
      }

      // Search subdirs in parallel (batches of 5)
      for (let i = 0; i < subdirs.length; i += 5) {
        await Promise.all(subdirs.slice(i, i + 5).map(d => searchDir(d)));
      }
    } catch (e) { /* skip inaccessible dirs */ }
  }

  await searchDir('/');

  if (matches.length > 0) {
    let html = '<div class="results">';
    // Sort: exact matches first, then by path length
    matches.sort((a, b) => {
      const aExact = a.name.replace(/\.\w+$/, '').toLowerCase() === needle;
      const bExact = b.name.replace(/\.\w+$/, '').toLowerCase() === needle;
      if (aExact !== bExact) return bExact - aExact;
      return a.path.length - b.path.length;
    });
    const label = matches.length === 1 ? 'Found 1 match' : `Found ${matches.length} matches`;
    html += `<p class="searching">${label} for "<strong>${needle}</strong>":</p>`;
    for (const m of matches) {
      html += `<a href="${m.path}">${m.name}<div class="match-path">${m.path}</div></a>`;
    }
    html += '</div>';
    output.innerHTML = html;

    // Auto-redirect if exactly 1 match
    if (matches.length === 1) {
      location.href = matches[0].path;
    }
  } else {
    output.innerHTML = '<p class="no-results">No files matching "<strong>' + needle + '</strong>" found in this project.</p>';
  }
})();
</script>

</body>
</html>
